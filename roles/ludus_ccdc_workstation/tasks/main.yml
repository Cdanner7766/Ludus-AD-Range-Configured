---
# tasks file for ludus_ccdc_workstation
# Installs blue team tools via Chocolatey on the Win11 workstation.
# Replaces install_additional_tools: true to avoid the vscode Chocolatey
# package, which consistently fails to download from update.code.visualstudio.com
# in automated environments (Microsoft rate-limits/blocks the CDN endpoint).

- name: "Install blue team tools via Chocolatey"
  chocolatey.chocolatey.win_chocolatey:
    name:
      - networkmonitor
      - processhacker
      - 7zip
      - croc
      - firefox
      - burp-suite-free-edition
      - ilspy
      - explorersuite
      - wireshark
    state: present
    timeout: 2700
